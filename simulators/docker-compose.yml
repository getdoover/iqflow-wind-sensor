services:
  device_agent:
    image: spaneng/doover_device_agent:apps
    network_mode: host

  wind_sim:
    build: ./sample
    network_mode: host
    restart: unless-stopped
    depends_on:
      - device_agent
    environment:
      - APP_KEY=sim_app_key

  iqflow_wind_sensor:
    build: ../
    network_mode: host
    restart: unless-stopped
    depends_on:
      - device_agent
      - wind_sim
    environment:
      - APP_KEY=test_app_key
      - CONFIG_FP=/app/simulators/app_config.json
